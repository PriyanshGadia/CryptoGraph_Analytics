version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cryptograph_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_pass}
      POSTGRES_DB: ${DB_NAME:-cryptograph}
    volumes:
      - cryptograph_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user} -d ${DB_NAME:-cryptograph}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: cryptograph_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cryptograph_backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_KEY=${API_KEY}
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql+psycopg2://${DB_USER:-crypto_user}:${DB_PASSWORD:-crypto_pass}@db:5432/${DB_NAME:-cryptograph}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - cryptograph_db_data:/app/database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptograph_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_KEY=${API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  cryptograph_db_data:
  cryptograph_pg_data:
