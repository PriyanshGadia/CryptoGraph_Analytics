version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes: ["./ml/artifacts:/app/artifacts"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ml-worker:
    build: ./ml
    command: python scheduler.py
    env_file: ./ml/.env
    volumes: ["./ml/artifacts:/app/artifacts"]
    restart: on-failure
