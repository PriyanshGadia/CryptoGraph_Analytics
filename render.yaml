services:
  - type: web
    name: cryptograph-backend
    env: python
    region: ohio
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PYTHONPATH
        value: "/opt/render/project/src"
      - key: ENVIRONMENT
        value: production
      - key: LOW_MEM
        value: "true"
      - key: FRONTEND_URL
        fromService:
          name: cryptograph-frontend
          type: web
          property: host
      # Add these securely via the Render dashboard:
      - key: GROQ_API_KEY
        sync: false
      - key: API_KEY
        sync: false
    healthCheckPath: /health
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1

  - type: web
    name: cryptograph-frontend
    env: node
    region: ohio
    plan: starter
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && node .next/standalone/server.js"
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cryptograph-backend
          type: web
          property: host
